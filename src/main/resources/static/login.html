<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>登录 - 题目练习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            border: none;
            font-size: 18px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: #667eea;
        }

        .tab:hover {
            background: #e8e8e8;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab active" id="loginTab">登录</button>
        <button class="tab" id="registerTab">注册</button>
    </div>

    <div class="form-container">
        <form id="loginForm">
            <h2 class="form-title">欢迎回来</h2>
            <div class="form-group">
                <label for="loginUsername">用户名</label>
                <input id="loginUsername" name="username" placeholder="请输入用户名" required type="text">
            </div>
            <div class="form-group">
                <label for="loginPassword">密码</label>
                <input id="loginPassword" name="password" placeholder="请输入密码" required type="password">
            </div>
            <button class="btn-submit" type="submit">登录</button>
            <div class="message" id="loginMessage"></div>
        </form>

        <form class="hidden" id="registerForm">
            <h2 class="form-title">创建账号</h2>
            <div class="form-group">
                <label for="regUsername">用户名</label>
                <input id="regUsername" name="username" placeholder="请输入用户名" required type="text">
            </div>
            <div class="form-group">
                <label for="regEmail">邮箱（选填）</label>
                <input id="regEmail" name="email" placeholder="请输入邮箱" type="email">
            </div>
            <div class="form-group">
                <label for="regNickname">昵称（选填）</label>
                <input id="regNickname" name="nickname" placeholder="请输入昵称" type="text">
            </div>
            <div class="form-group">
                <label for="regPassword">密码</label>
                <input id="regPassword" name="password" placeholder="请输入密码" required type="password">
            </div>
            <button class="btn-submit" type="submit">注册</button>
            <div class="message" id="registerMessage"></div>
        </form>
    </div>
</div>

<script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    });

    registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    });

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = document.getElementById('loginMessage');

        const data = {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.code === 200) {
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));
                message.className = 'message success';
                message.textContent = '登录成功！正在跳转...';

                setTimeout(() => {
                    window.location.href = '/questions.html';
                }, 1000);
            } else {
                message.className = 'message error';
                message.textContent = result.message;
            }
        } catch (error) {
            message.className = 'message error';
            message.textContent = '登录失败：' + error.message;
        }
    });

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = document.getElementById('registerMessage');

        const data = {
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
            nickname: document.getElementById('regNickname').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.code === 200) {
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));
                message.className = 'message success';
                message.textContent = '注册成功！正在跳转...';

                setTimeout(() => {
                    window.location.href = '/questions.html';
                }, 1000);
            } else {
                message.className = 'message error';
                message.textContent = result.message;
            }
        } catch (error) {
            message.className = 'message error';
            message.textContent = '注册失败：' + error.message;
        }
    });
</script>
</body>
</html>
